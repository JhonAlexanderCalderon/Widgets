<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Vat D Level Calculator</title>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0e1117;
            --surface: #161b22;
            --surface-hover: #1c2230;
            --border: #2a3140;
            --border-focus: #22c55e;
            --text-primary: #e6edf3;
            --text-secondary: #8b949e;
            --text-muted: #545d68;
            --accent: #22c55e;
            --accent-dim: rgba(34,197,94,0.12);
            --radius: 14px;
            --radius-sm: 10px;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            font-family: 'DM Sans', sans-serif;
            background: var(--bg);
            color: var(--text-primary);
            min-height: 100dvh;
            padding: 24px 16px;
            display: flex;
            justify-content: center;
            align-items: flex-start;
        }

        .wrapper {
            width: 100%;
            max-width: 460px;
        }

        .page-header {
            display: flex;
            align-items: center;
            gap: 14px;
            margin-bottom: 20px;
            padding: 0 4px;
        }
        .icon-badge {
            width: 46px; height: 46px;
            background: var(--accent-dim);
            border: 1px solid rgba(34,197,94,0.25);
            border-radius: 12px;
            display: grid; place-items: center;
            flex-shrink: 0;
        }
        .icon-badge svg { width: 24px; height: 24px; stroke: var(--accent); }
        .header-text h1 {
            font-size: 20px; font-weight: 700;
            letter-spacing: -0.3px;
            line-height: 1.2;
        }
        .header-text .subtitle {
            font-size: 13px;
            color: var(--text-muted);
            font-weight: 500;
        }

        .card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 24px 20px;
        }
        .card-desc {
            font-size: 13px;
            color: var(--text-secondary);
            margin-bottom: 24px;
            line-height: 1.5;
        }

        .mode-toggle {
            display: flex;
            background: var(--bg);
            border-radius: var(--radius-sm);
            padding: 4px;
            margin-bottom: 24px;
            gap: 4px;
        }
        .mode-toggle input[type="radio"] { display: none; }
        .mode-toggle label {
            flex: 1;
            text-align: center;
            padding: 14px 10px;
            font-size: 14px;
            font-weight: 600;
            color: var(--text-muted);
            cursor: pointer;
            border-radius: 8px;
            transition: color 0.2s, background 0.2s;
            user-select: none;
        }
        .mode-toggle input[type="radio"]:checked + label {
            color: var(--text-primary);
            background: var(--surface-hover);
            box-shadow: 0 1px 4px rgba(0,0,0,0.35);
        }

        .field-label {
            font-size: 13px;
            font-weight: 600;
            color: var(--text-secondary);
            margin-bottom: 8px;
            display: block;
        }
        .input-wrap {
            position: relative;
            margin-bottom: 20px;
        }
        .input-wrap input {
            width: 100%;
            padding: 16px 18px;
            padding-right: 54px;
            background: var(--bg);
            border: 1.5px solid var(--border);
            border-radius: var(--radius-sm);
            color: var(--text-primary);
            font-family: 'JetBrains Mono', monospace;
            font-size: 18px;
            font-weight: 500;
            outline: none;
            transition: border-color 0.2s;
        }
        .input-wrap input::placeholder {
            color: var(--text-muted);
            font-family: 'DM Sans', sans-serif;
            font-weight: 400;
            font-size: 15px;
        }
        .input-wrap input:focus { border-color: var(--border-focus); }
        .input-unit {
            position: absolute;
            right: 18px;
            top: 50%; transform: translateY(-50%);
            font-size: 14px;
            font-weight: 600;
            color: var(--text-muted);
            pointer-events: none;
        }

        .calc-btn {
            width: 100%;
            padding: 16px;
            border: none;
            border-radius: var(--radius-sm);
            font-family: 'DM Sans', sans-serif;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: filter 0.2s, transform 0.08s;
            color: #fff;
            letter-spacing: 0.2px;
            background: var(--accent);
        }
        .calc-btn:hover { filter: brightness(1.12); }
        .calc-btn:active { transform: scale(0.98); }

        .result-box {
            margin-top: 24px;
            padding: 22px 16px;
            border-radius: var(--radius-sm);
            text-align: center;
            min-height: 70px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }
        .result-box.empty {
            background: transparent;
            border: 1.5px dashed var(--border);
        }
        .result-box.filled {
            background: var(--accent-dim);
            border: 1.5px solid rgba(34,197,94,0.2);
        }
        .result-box.error {
            background: rgba(239,68,68,0.08);
            border: 1.5px solid rgba(239,68,68,0.2);
        }
        .result-label {
            font-size: 12px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.8px;
            color: var(--text-muted);
            margin-bottom: 6px;
        }
        .result-value {
            font-family: 'JetBrains Mono', monospace;
            font-size: 32px;
            font-weight: 600;
            letter-spacing: -0.5px;
            color: var(--accent);
        }
        .result-value.error-text { color: #ef4444; font-size: 15px; font-family: 'DM Sans', sans-serif; }
        .result-unit {
            font-size: 14px;
            color: var(--text-secondary);
            font-weight: 500;
            margin-top: 2px;
        }
        .result-box.empty .placeholder-text {
            font-size: 14px;
            color: var(--text-muted);
        }

        @media (min-width: 768px) {
            body { padding: 48px 24px; align-items: center; }
            .card { padding: 32px 28px; }
        }
    </style>
</head>
<body>

    <div class="wrapper">
        <div class="page-header">
            <div class="icon-badge">
                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.8" stroke="currentColor">
                    <rect x="5" y="6" width="14" height="12" rx="2" stroke-linecap="round" stroke-linejoin="round"/>
                    <path d="M5 8c0-2.5 3.134-4 7-4s7 1.5 7 4" stroke-linecap="round" stroke-linejoin="round"/>
                    <line x1="7" y1="18" x2="7" y2="21" stroke-linecap="round"/>
                    <line x1="17" y1="18" x2="17" y2="21" stroke-linecap="round"/>
                    <line x1="7" y1="13" x2="17" y2="13" stroke-linecap="round" stroke-dasharray="2 2"/>
                    <line x1="12" y1="2" x2="12" y2="4" stroke-linecap="round"/>
                </svg>
            </div>
            <div class="header-text">
                <h1>Vat D Level</h1>
                <div class="subtitle">Linear model calculation</div>
            </div>
        </div>

        <div class="card">
            <div class="card-desc">Convert between volume (Liters) and top distance (cm).</div>

            <div class="mode-toggle">
                <input type="radio" name="mode" id="mode_vd" value="vToD" checked>
                <label for="mode_vd">Volume → Distance</label>
                <input type="radio" name="mode" id="mode_dv" value="dToV">
                <label for="mode_dv">Distance → Volume</label>
            </div>

            <label class="field-label" id="fieldLabel">Volume</label>
            <div class="input-wrap">
                <input type="number" id="inputVal" inputmode="decimal" step="any" placeholder="e.g. 500">
                <span class="input-unit" id="unitLabel">L</span>
            </div>

            <button class="calc-btn" onclick="calculate()">Calculate</button>

            <div class="result-box empty" id="resultBox">
                <span class="placeholder-text">Result will appear here</span>
            </div>
        </div>
    </div>

    <script>
        const a = -0.0953;
        const b = 121.91;

        document.querySelectorAll('input[name="mode"]').forEach(r => {
            r.addEventListener('change', () => {
                const isVtoD = r.value === 'vToD';
                document.getElementById('fieldLabel').textContent = isVtoD ? 'Volume' : 'Top distance';
                document.getElementById('unitLabel').textContent = isVtoD ? 'L' : 'cm';
                document.getElementById('inputVal').value = '';
                document.getElementById('inputVal').placeholder = isVtoD ? 'e.g. 500' : 'e.g. 70';
                resetResult();
            });
        });

        function calculate() {
            const val = parseFloat(document.getElementById('inputVal').value);
            const box = document.getElementById('resultBox');
            if (isNaN(val)) return showError(box, 'Enter a valid number');

            const mode = document.querySelector('input[name="mode"]:checked').value;
            if (mode === 'vToD') {
                const dist = a * val + b;
                showResult(box, 'Top distance', dist.toFixed(1), 'cm');
            } else {
                const vol = (val - b) / a;
                showResult(box, 'Volume', vol.toFixed(1), 'Liters');
            }
        }

        function showResult(box, label, value, unit) {
            box.className = 'result-box filled';
            box.innerHTML = `
                <div class="result-label">${label}</div>
                <div class="result-value">${value}</div>
                <div class="result-unit">${unit}</div>`;
        }

        function showError(box, msg) {
            box.className = 'result-box error';
            box.innerHTML = `<div class="result-value error-text">${msg}</div>`;
        }

        function resetResult() {
            const box = document.getElementById('resultBox');
            box.className = 'result-box empty';
            box.innerHTML = '<span class="placeholder-text">Result will appear here</span>';
        }

        document.getElementById('inputVal').addEventListener('keydown', e => {
            if (e.key === 'Enter') { e.preventDefault(); calculate(); }
        });
    </script>
</body>
</html>
